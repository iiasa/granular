name: Build docs/ for GitHub Pages

# Pages is configured to serve from `main` branch, `/docs` folder. This
# workflow rebuilds `docs/` on push and commits it back so the published
# site stays in sync with source without a manual build step.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci || npm install

      - run: npm run build

      - name: Commit docs/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to docs/."
          else
            git commit -m "Build docs/ [skip ci]"
            git push
          fi
